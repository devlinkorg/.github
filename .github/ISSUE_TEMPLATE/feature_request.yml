name: Feature request
description: Propose a workflow, documentation, or repository improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new workflow, documentation, automation, routing, or contributor-experience improvements.
  - type: input
    id: area
    attributes:
      label: Area
      description: Which part of the repository or process should change?
      placeholder: "Example: onboarding flow, docs workflow, issue templates"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point, gap, or limitation does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any other options you considered.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this is complete?
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true
