name: Documentation update
description: Request a correction or improvement to documentation.
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: document
    attributes:
      label: Document or section
      description: Which file, heading, link, or workflow page needs attention?
      placeholder: "Example: README.md > Getting Started"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current state
      description: What is unclear, incorrect, outdated, or missing?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: What should the documentation say or link to instead?
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: Who is most affected by this documentation issue?
      options:
        - New contributors
        - Maintainers
        - Project leads
        - Guild members
        - External readers
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Add related links, screenshots, issues, or examples.
    validations:
      required: false
