name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'guilds/**'
      - 'systems/**'
      - 'profile/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '.markdownlint.yml'
      - '*.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'guilds/**'
      - 'systems/**'
      - 'profile/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '.markdownlint.yml'
      - '*.md'

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,206,429
            --exclude-mail
            --exclude 'https://github.com/.*/discussions.*'
            --exclude 'https://github.com/.*/issues.*'
            --exclude 'https://github.com/.*/security/policy'
            '**/*.md'
          fail: true
